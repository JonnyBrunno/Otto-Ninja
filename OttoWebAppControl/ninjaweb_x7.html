<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <title>Otto Ninja X7 Web App Control</title>

    <!-- PLEASE NO CHANGES BELOW THIS LINE (UNTIL I SAY SO) -->
    <script language="javascript" type="text/javascript" src="libraries/p5.min.js"></script>

    <script>
        function LoadSweetOnline() {
            let script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/npm/sweetalert2@10";
            document.head.append(script);
        }

    <style>
        :root {
            --background: #000;
            --brand-color: #FF0000;
            --highlight: #FF0000;
            --secondary-highlight: #FF5C5C;
            --success-color: #2ecc71;
            --text: #FFF;
            --btn-size: 70px;
            --btn-radius: 50%;
            --font-main: inherit;
        }
        body {
            font-family: var(--font-main);
            overflow-y: auto; /* garante rolagem se os controles não couberem na tela */
        }
        h3 {
            color: var(--text);
        }
        .setting--icon {
            background-image: url('img/ninja-setting-icon.svg');
        }
        #dir--toggle {
            font-size: 2rem;
            font-weight: bold;
            padding: 1rem;
            border: 2px solid var(--brand-color);
            background: transparent;
            color: var(--text);
            margin-top: 2rem;
        }
        .gamepad .mode--section {
            width: 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
        }
        .gamepad .functions {
            width: 46%;
        }
        .functions .arms--grid {
            display: grid;
            grid-template-columns: repeat(2, var(--btn-size));
            grid-template-rows: repeat(2, var(--btn-size));
            gap: 1rem;
            justify-content: center;
        }
        .functions .function--btn {
            width: var(--btn-size);
            height: var(--btn-size);
            margin: 0;
            padding: 0;
            border-radius: var(--btn-radius);
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            background: var(--brand-color);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .functions .function--btn:hover {
            cursor: pointer;
            background: var(--secondary-highlight);
        }
        .functions .function--btn:active {
            filter: brightness(0.85);
        }
        #sentinela-btn,
        .toggle-mode-btn {
            width: auto;
            height: auto;
            min-width: var(--btn-size);
            min-height: var(--btn-size);
            border-radius: var(--btn-radius);
            font-size: 1.3rem;
            padding: 1rem 0.5rem;
            border: 3px solid var(--text);
            margin-top: 1.5rem;
        }
        #sentinela-btn.active,
        .toggle-mode-btn.active {
            background: var(--success-color);
            border-color: var(--success-color);
        }
        /* Botões de ação única (não ficam "ativos", só disparam uma performance) */
        .action-mode-btn {
            width: auto;
            height: auto;
            min-width: var(--btn-size);
            min-height: var(--btn-size);
            border-radius: var(--btn-radius);
            font-size: 1.3rem;
            padding: 1rem 0.5rem;
            border: 3px solid var(--text);
            margin-top: 1rem;
        }
        .special-modes-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }
        /* Controles deslizantes (velocidade e cabeça) */
        .slider--control {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
            font-size: 1.2rem;
            margin-top: 1.2rem;
            width: 100%;
        }
        .slider--control input[type=range] {
            width: 160px;
            accent-color: var(--brand-color);
        }
        .slider--control .slider--value {
            font-weight: bold;
            margin-top: 0.2rem;
        }
        /* Enquanto uma troca de modo está em andamento, sinaliza visualmente e bloqueia novo clique */
        .tumbler-wrapper.switching {
            opacity: 0.5;
            pointer-events: none;
        }
        .control--footer {
            flex-direction: column;
            align-items: center;
        }
        .tumbler-wrapper {
            background-color: var(--brand-color);
        }
        .tumbler-wrapper img {
            width: 15px;
            height: 15px;
        }
        .tumbler-night {
            transform: translateX(calc(100% - 2px));
        }
        .settings {
            font-size: 1.8rem;
        }
        .settings input[type=text] {
            padding: .5rem;
            border: 1px solid var(--brand-color);
        }
        .settings input[type=number] {
            width: 5rem;
            height: 5rem;
            border: 3px solid var(--brand-color);
            text-align: center;
            font-size: 1.6rem;
        }
        .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: red;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 0;
            font-size: 1.2rem;
            position: absolute;
            z-index: 1;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible;
        }
        footer span {
            padding: 0;
        }
        footer ul {
            list-style-type: none;
            display: flex;
        }
        footer ul li {
            font-size: 1.6rem;
            margin: 0 1rem;
        }

        @media screen and (max-height:400px) and (orientation:landscape) {
            html { overflow-y: hidden; }
            header { height: 10vh; }
            header #app--icon { width: 30px; }
            header h1 { font-size: 2rem; }
            .wrapper { min-height: 280px; }
            .robot--selector { height: 15%; }
            .robot--icon { width: 25px; }
            .container__setting--icon { width: 60px; height: 60px; }
            .setting--icon { background-size: contain; }
            .robot--controls { height: 85%; }
            .gamepad { width: 90%; border: 5px solid var(--brand-color); }
            .arrow, .stop--button { background-size: 70%; width: 40px; height: 40px; }
            .gamepad .mode--section { font-size: 1.5rem; }
            .tumbler-wrapper { height: 25px; width: 60px; }
            .tumbler { height: 23px; width: 23px; }
            .tumbler-night { transform: translateX(calc(100% - -5px)); }
            .functions .function--btn { width: 60px; height: 60px; margin: 0 1rem; padding: 0 0.5rem; font-size: 2.5rem; }
            .control--footer { margin-top: 1rem; }
            footer { display: block; text-align: center; margin-top: 1rem; }
            footer span { position: static; font-size: .5rem; }
            footer img { width: 8rem; }
        }
    </style>
</head>
<body>
    
    <main>
        <div class="wrapper">
            
            <section class="robot--selector">
                <div class="otto--robots">
                    <div id="OttoNinja" onclick="SetRobot('Otto Ninja')"><img src="img/OttoNinja.svg" alt="Otto Ninja robot icon" class="robot--icon"></div>
                    <div id="OttoNinjaHumanoid" onclick="ComingSoon('Otto Ninja Humanoid')" class="disabled"><img src="img/OttoNinjaHumanoid.svg" alt="Otto Ninja Humanoid robot icon" class="robot--icon"></div>
                </div>
                <div class="container__setting--icon"><span class="setting--icon" onclick="settings()"></span></div>
                <div class="container__arduino--icon"><span class="codes--icon" onclick="arduinoCodes()"></span></div>
            </section>

            <section class="robot--controls">
                <div class="gamepad">
                    
                    <div id="disconnectMessage--container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%;">
                        <header>
                            <img id="app--icon" src="img/Ninja-WAC-Icon.svg" alt="Icon of the web app of Otto DIY for Otto Ninja">
                            <h1>Web App Control</h1>
                        </header>
                        <h3 style="font-size: 2rem;">Click a robot to connect it & get the controller!</h3>
                    </div>

                    <div id="dir--keys" class="dir--keys" style="display:none; justify-content:flex-start; flex-direction: column;   align-items: center;">
                        <button id="dir--toggle" onclick="changeControlMode()" style="display:none;">Joystick</button>

                        <!-- Controle do ângulo da cabeça: posição fixa logo no topo, não se
                             move entre os modos walk/roll (era isso que empurrava a barra pra
                             baixo do campo de IP quando o modo joystick estava aberto). -->
                        <div class="slider--control">
                            <label for="head-slider">Cabeça</label>
                            <input type="range" id="head-slider" min="0" max="180" value="90">
                            <span class="slider--value" id="head-value">90°</span>
                        </div>

                        <div id="joystick--control" style="display: none; z-index: 1000; flex-direction: column; align-items: center;">
                            <canvas id="joystick--canvas" name="game" width="200" height="200"></canvas>

                            <!-- controle de velocidade máxima do modo joystick -->
                            <div class="slider--control">
                                <label for="speed-slider">Velocidade máxima</label>
                                <input type="range" id="speed-slider" min="0" max="100" value="100">
                                <span class="slider--value" id="speed-value">100%</span>
                            </div>
                        </div>

                        <div id="buttons--control" style="margin-top: 3rem;">
                            <div class="top">
                                <span class="up arrow" onclick="btnPressed('up')"></span>
                            </div>
                            <div class="middle">
                                <span class="left arrow" onclick="btnPressed('left')"></span>
                                <span class="stop--button" onclick="btnPressed('s')"></span>
                                <span class="right arrow" onclick="btnPressed('right')"></span>
                            </div>
                            <div class="bottom">
                                <span class="down arrow" onclick="btnPressed('down')"></span>
                            </div>
                        </div>
                    </div>
                    <div class="mode--section" style="display:none;">
                        <label class="txt" for="starter-switch">Mode</label>
                        <div class="tumbler-wrapper" id="tumbler-wrapper" onclick="setMode()">
                            <div class="tumbler"></div>
                            <img src="img/OttoNinjaRoll.svg" alt="Otto Ninja Roll mode image"/>
                            <img src="img/OttoNinja.svg" alt="Otto Ninja image"/>
                            </div>
                    </div>
                    <div id="functions--section" class="functions" style="display:none; flex-direction: column; align-items: center;">
                        <div class="arms--grid">
                            <button id="arm-a-btn" class="function--btn tooltip">A<span class="tooltiptext">Sobe o braço direito (segure)</span></button>
                            <button id="arm-b-btn" class="function--btn tooltip">B<span class="tooltiptext">Sobe o braço esquerdo (segure)</span></button>
                            <button id="arm-a1-btn" class="function--btn tooltip">A1<span class="tooltiptext">Desce o braço direito (segure)</span></button>
                            <button id="arm-b1-btn" class="function--btn tooltip">B1<span class="tooltiptext">Desce o braço esquerdo (segure)</span></button>
                        </div>
                        <button id="sentinela-btn" class="function--btn tooltip" onclick="toggleAvoidance()">Sentinela<span class="tooltiptext">Anda em um quadrado de ~1m desviando de obstáculos (mostra cara de morto ao detectar um)</span></button>

                        <div class="special-modes-row">
                            <button id="sumo-btn" class="function--btn tooltip toggle-mode-btn" onclick="toggleSumo()">Sumo<span class="tooltiptext">Sobe/desce os braços continuamente, com olhos de raiva no OLED</span></button>
                            <button id="berserker-btn" class="function--btn tooltip toggle-mode-btn" onclick="toggleBerserker()">Berserker<span class="tooltiptext">Traça uma estrela de 6 pontas contínua no modo roda</span></button>
                            <button id="birthday-btn" class="function--btn tooltip action-mode-btn" onclick="playHappyBirthday()">🎂<span class="tooltiptext">Canta Parabéns pra Você</span></button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="control--footer">
                <div class='settings' style="text-align: center;">
                    <div>
                        <label for="ip">IP Address for your Otto Ninja: </label>
                        <input type="text" name="ip" id="ip" placeholder="Write IP Address" value="http://172.27.23.109/"/>
                    </div> 
                </div>

                <iframe src="" frameborder="0" style="display:none;" id="myNinja"></iframe>
            </section>

        </div>
    </main>

        </ul>
        <img class="contact--icon" src="img/contact-icon.webp" alt="Otto robot with headphones as a call center assistant" onclick="FeedbackModal()"/>

    <script>
        let KEY;
        let Ninja = document.getElementById("myNinja");
        let Ip = document.getElementById("ip");
        let mode = "walk";
        let avoidanceOn = false;
        let sumoOn = false;
        let berserkerOn = false;
        let modeSwitching = false; // NOVO: trava contra clique duplo na troca de modo

        function setMode() {
            if (modeSwitching) return; // NOVO: ignora clique enquanto a troca anterior ainda está em andamento
            modeSwitching = true;
            document.getElementById("tumbler-wrapper").classList.add("switching");

            document.getElementsByClassName('tumbler')[0].classList.toggle('tumbler-night');
            if (mode === "walk") {
                mode = "roll";
                document.getElementById("joystick--control").style.display = "flex";
                document.getElementById("buttons--control").style.display = "none";
                Command("rollmode");
            } else {
                mode = "walk";
                document.getElementById("joystick--control").style.display = "none";
                document.getElementById("buttons--control").style.display = "block";
                Command("walkmode");
            }
            disableAllSpecialModes();

            // NOVO: libera um novo clique só depois de um tempo compatível com a
            // transição no firmware (SetWalk/SetRoll levam ~250ms de delay lá dentro,
            // mais folga pra não sobrepor comandos e sobrecarregar os servos)
            setTimeout(function () {
                modeSwitching = false;
                document.getElementById("tumbler-wrapper").classList.remove("switching");
            }, 700);
        }

        function toggleAvoidance() {
            if (avoidanceOn) {
                disableAvoidance();
            } else {
                avoidanceOn = true;
                document.getElementById("sentinela-btn").classList.add("active");
                Command("avoidance");
            }
        }

        function disableAvoidance() {
            if (!avoidanceOn) return;
            avoidanceOn = false;
            document.getElementById("sentinela-btn").classList.remove("active");
            Command("stop");
        }

        function toggleSumo() {
            if (sumoOn) { disableSumo(); return; }
            disableAvoidance();
            disableBerserker();
            sumoOn = true;
            document.getElementById("sumo-btn").classList.add("active");
            Command("sumo");
        }

        function disableSumo() {
            if (!sumoOn) return;
            sumoOn = false;
            document.getElementById("sumo-btn").classList.remove("active");
            Command("stop");
        }

        function toggleBerserker() {
            if (berserkerOn) { disableBerserker(); return; }
            disableAvoidance();
            disableSumo();
            berserkerOn = true;
            document.getElementById("berserker-btn").classList.add("active");
            Command("berserker");
        }

        function disableBerserker() {
            if (!berserkerOn) return;
            berserkerOn = false;
            document.getElementById("berserker-btn").classList.remove("active");
            Command("stop");
        }

        // Dispara a performance de Parabéns pra Você (ação única, não fica "ativa")
        function playHappyBirthday() {
            disableAllSpecialModes();
            Command("happybirthday");
        }

        // Cancela qualquer modo especial em andamento - chamada antes de qualquer
        // comando manual (joystick, botões de direção, braços, troca de modo)
        function disableAllSpecialModes() {
            disableAvoidance();
            disableSumo();
            disableBerserker();
        }

        function Command(c) {
            Ip = document.getElementById("ip").value;
            switch (c) {
                case "walkmode":
                    Ninja.src = Ip+"walkmode";
                    break;

                case "rollmode":
                    Ninja.src = Ip+"rollmode";
                    break;

                case "forward":
                    Ninja.src = Ip+"forward";
                    break;

                case "right":
                    Ninja.src = Ip+"right";
                    break;

                case "backward":
                    Ninja.src = Ip+"backward";
                    break;

                case "left":
                    Ninja.src = Ip+"left";
                    break;

                case "stop":
                    Ninja.src = Ip+"stop";
                    break;

                case "armRightUp":
                    Ninja.src = Ip+"armRightUp";
                    break;

                case "armRightDown":
                    Ninja.src = Ip+"armRightDown";
                    break;

                case "armLeftUp":
                    Ninja.src = Ip+"armLeftUp";
                    break;

                case "armLeftDown":
                    Ninja.src = Ip+"armLeftDown";
                    break;

                case "avoidance":
                    Ninja.src = Ip + (mode === "roll" ? "avoidanceroll" : "sentinela");
                    break;

                case "sumo":
                    Ninja.src = Ip + "sumo";
                    break;

                case "berserker":
                    Ninja.src = Ip + "berserker";
                    break;

                case "happybirthday":
                    Ninja.src = Ip + "happybirthday";
                    break;

                case "save-setting":
                    Ninja.src = Ip+"R="+document.getElementById("RF").value+"&LF="+document.getElementById("LF").value+"&RB="+document.getElementById("RB").value+"&LB="+document.getElementById("LB").value;
                    break;

                default:
                    break;
            }
        }

        // NOVO: envia a velocidade máxima do joystick (0-100%) pro firmware
        function sendSpeed(value) {
            Ip = document.getElementById("ip").value;
            Ninja.src = Ip + "speed=" + value;
        }

        // NOVO: envia o ângulo da cabeça (0-180°) pro firmware
        function sendHead(value) {
            Ip = document.getElementById("ip").value;
            Ninja.src = Ip + "head=" + value;
        }

        window.addEventListener('load', function () {
            var speedSlider = document.getElementById('speed-slider');
            var speedValue = document.getElementById('speed-value');
            speedSlider.addEventListener('input', function () {
                speedValue.textContent = speedSlider.value + '%';
                sendSpeed(speedSlider.value);
            });

            var headSlider = document.getElementById('head-slider');
            var headValue = document.getElementById('head-value');
            headSlider.addEventListener('input', function () {
                headValue.textContent = headSlider.value + '°';
                sendHead(headSlider.value);
            });
        });

        window.addEventListener('keydown', function (e) {
            KEY++;
            if(KEY == 1) {
                if (e.key == "ArrowUp") {
                    btnPressed('up');
                }
                else if (e.key == "ArrowDown") {
                    btnPressed('down');
                }
                else if (e.key == "ArrowRight") {
                    btnPressed('right');
                }
                else if (e.key == "ArrowLeft") {
                    btnPressed('left');
                }
                else if (e.key == "s") {
                    btnPressed('s');
                }
                else if (e.key == "w") {
                    mode === "roll" ? setMode() : null;
                }
                else if (e.key == "r") {
                    mode === "walk" ? setMode() : null;
                }
                else if (e.key == "a") {
                    btnPressed('a');
                }
            }
        }, false);

        window.addEventListener('keyup', function (e) {
            KEY = 0;
        }, false);

        function btnPressed(btn) {
            disableAllSpecialModes();

            if (btn == "up") {
                changeBackgroundColor("up");
                Command("forward");
            }
            else if  (btn == "down"){
                changeBackgroundColor("down");
                Command("backward");
            }
            else if  (btn == "right"){
                changeBackgroundColor("right");
                Command("right");
            }
            else if  (btn == "left"){
                changeBackgroundColor("left");
                Command("left");
            }
            else if  (btn == "s"){
                changeBackgroundColor("s");
                Command("stop");
            }
            else {
                //Stop();
            }

    }

    function changeBackgroundColor(btn) {
        if (btn == "up") {
            document.getElementsByClassName('up')[0].style.backgroundColor = "var(--secondary-highlight)";
            document.getElementsByClassName('right')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('down')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('left')[0].style.backgroundColor = "var(--brand-color)";
        }
        else if (btn == "right") {
            document.getElementsByClassName('up')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('right')[0].style.backgroundColor = "var(--secondary-highlight)";
            document.getElementsByClassName('down')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('left')[0].style.backgroundColor = "var(--brand-color)";
        }
        else if (btn == "down") {
            document.getElementsByClassName('up')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('right')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('down')[0].style.backgroundColor = "var(--secondary-highlight)";
            document.getElementsByClassName('left')[0].style.backgroundColor = "var(--brand-color)";
        }
        else if (btn == "left") {
            document.getElementsByClassName('up')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('right')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('down')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('left')[0].style.backgroundColor = "var(--secondary-highlight)";
        }
        else if (btn == "s") {
            document.getElementsByClassName('up')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('right')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('down')[0].style.backgroundColor = "var(--brand-color)";
            document.getElementsByClassName('left')[0].style.backgroundColor = "var(--brand-color)";
        }
    }

    function SetRobot(ROBOT) {

    <!-- Joystick scripts -->
    <script>
        var joystickCanvas, ctx;
        var joystickResendInterval = null;
        const JOYSTICK_RESEND_MS = 100; // mais frequente, dá redundância contra engasgos de rede

        window.addEventListener('load', () => {

            joystickCanvas = document.getElementById('joystick--canvas');
            ctx = joystickCanvas.getContext('2d');
            resize();

            joystickCanvas.addEventListener('mousedown', startDrawing);
            joystickCanvas.addEventListener('touchstart', startDrawing);

            window.addEventListener('mouseup', stopDrawing);
            window.addEventListener('touchend', stopDrawing);
            window.addEventListener('touchcancel', stopDrawing);

            window.addEventListener('mousemove', Draw);
            window.addEventListener('touchmove', Draw);

            window.addEventListener('resize', resize);

            var armHoldIntervals = {};

            function bindArmHoldButton(btnId, commandName) {
                var btn = document.getElementById(btnId);

                function start(e) {
                    e.preventDefault();
                    stop();
                    disableAllSpecialModes();
                    Command(commandName);
                    armHoldIntervals[btnId] = setInterval(function () {
                        Command(commandName);
                    }, 150);
                }

                function stop() {
                    if (armHoldIntervals[btnId]) {
                        clearInterval(armHoldIntervals[btnId]);
                        armHoldIntervals[btnId] = null;
                    }
                }

                btn.addEventListener('mousedown', start);
                btn.addEventListener('touchstart', start);
                window.addEventListener('mouseup', stop);
                window.addEventListener('touchend', stop);
                window.addEventListener('touchcancel', stop);
            }

            bindArmHoldButton('arm-a-btn', 'armRightUp');
            bindArmHoldButton('arm-a1-btn', 'armRightDown');
            bindArmHoldButton('arm-b-btn', 'armLeftUp');
            bindArmHoldButton('arm-b1-btn', 'armLeftDown');
        });

        var width, height, radius, x_orig, y_orig;
        function resize() {
            width = 200;
            radius = 50;
            height = 250;
            ctx.canvas.width = width;
            ctx.canvas.height = height;
            canvasBackground();
            joystick(width / 2, height / 3);
        }

        function canvasBackground() {
            x_orig = width / 2;
            y_orig = height / 3;

            ctx.beginPath();
            ctx.arc(x_orig, y_orig, radius + 20, 0, Math.PI * 2, true);
            ctx.fillStyle = '#0F0F0F';
            ctx.fill();
        }

        function joystick(width, height) {
            ctx.beginPath();
            ctx.arc(width, height, radius, 0, Math.PI * 2, true);
            ctx.fillStyle = '#FF0000';
            ctx.fill();
            ctx.strokeStyle = '#FF3333';
            ctx.lineWidth = 8;
            ctx.stroke();
        }

        let coord = { x: 0, y: 0 };
        let paint = false;

        function getPosition(event) {
            if (!event) return;
            var mouse_x = event.clientX || (event.touches && event.touches[0] && event.touches[0].clientX);
            var mouse_y = event.clientY || (event.touches && event.touches[0] && event.touches[0].clientY);
            var rect = joystickCanvas.getBoundingClientRect();
            coord.x = mouse_x - rect.left;
            coord.y = mouse_y - rect.top;
        }

        function is_it_in_the_circle() {
            var current_radius = Math.sqrt(Math.pow(coord.x - x_orig, 2) + Math.pow(coord.y - y_orig, 2));
            if (radius >= current_radius) return true
            else return false
        }


        function startDrawing(event) {
            disableAllSpecialModes();
            paint = true;
            getPosition(event);
            if (is_it_in_the_circle()) {
                ctx.clearRect(0, 0, joystickCanvas.width, joystickCanvas.height);
                canvasBackground();
                joystick(coord.x, coord.y);
                Draw();
            }

            if (joystickResendInterval) clearInterval(joystickResendInterval);
            joystickResendInterval = setInterval(function () {
                if (paint) Draw();
            }, JOYSTICK_RESEND_MS);
        }


        function stopDrawing() {
            if (!paint) return;
            paint = false;

            if (joystickResendInterval) {
                clearInterval(joystickResendInterval);
                joystickResendInterval = null;
            }

            ctx.clearRect(0, 0, joystickCanvas.width, joystickCanvas.height);
            canvasBackground();
            joystick(width / 2, height / 3);
            
            Ninja.src = Ip + "J" + 0 + "," + 0;
        }

        function Draw(event) {

            if (paint) {
                ctx.clearRect(0, 0, joystickCanvas.width, joystickCanvas.height);
                canvasBackground();
                var angle_in_degrees,x, y, speed;
                var angle = Math.atan2((coord.y - y_orig), (coord.x - x_orig));

                if (Math.sign(angle) == -1) {
                    angle_in_degrees = Math.round(-angle * 180 / Math.PI);
                }
                else {
                    angle_in_degrees =Math.round( 360 - angle * 180 / Math.PI);
                }


                if (is_it_in_the_circle()) {
                    joystick(coord.x, coord.y);
                    x = coord.x;
                    y = coord.y;
                }
                else {
                    x = radius * Math.cos(angle) + x_orig;
                    y = radius * Math.sin(angle) + y_orig;
                    joystick(x, y);
                }

            
                getPosition(event);

                var speed =  Math.round(100 * Math.sqrt(Math.pow(x - x_orig, 2) + Math.pow(y - y_orig, 2)) / radius);

                var x_relative = Math.round(x - x_orig);
                var y_relative = Math.round(y - y_orig);
                mode === "roll" ? Ninja.src = Ip + "J" + x_relative + "," + y_relative : null;

            }
        } 
    </script>
